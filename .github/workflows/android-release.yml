name: Build Signed Android Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore signing key
        shell: bash
        run: |
          mkdir -p signing
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > signing/release.p12
          ls -l signing

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        shell: bash
        env:
          STORE_FILE: ${{ github.workspace }}/signing/release.p12
          STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            -Pandroid.injected.signing.store.type=PKCS12 \
            --stacktrace

      - name: Verify APK exists
        shell: bash
        run: |
          ls -R app/build/outputs/apk || true
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Verify APK signing
        shell: bash
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify \
            --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: app/build/outputs/apk/release/app-release.apk
          overwrite_files: true
